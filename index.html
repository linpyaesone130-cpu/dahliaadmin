<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Dahlia Admin</title>
<meta name="theme-color" content="#6d28d9"/><meta name="apple-mobile-web-app-capable" content="yes"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Padauk:wght@400;700&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
:root{--bg:#eef2ff;--sf:#ffffff;--sf2:#f5f8ff;--bd:#c7d7f5;--tx:#0f172a;--tx2:#334155;--tx3:#94a3b8;--ac:#1d4ed8;--ac2:#2563eb;--gn:#059669;--yw:#d97706;--rd:#dc2626;--blu:#3b82f6;--r:12px;--f:'Inter','Padauk',system-ui,sans-serif;--m:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}::-webkit-scrollbar{display:none}
body{font-family:var(--f);background:var(--bg);color:var(--tx);display:flex;justify-content:center}
.app{width:100%;max-width:430px;min-height:100vh;background:var(--bg);position:relative}
/* Auth screens */
.auth-sc{width:100%;max-width:430px;min-height:100vh;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.auth-logo{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 8px 24px rgba(0,0,0,.1)}
.auth-logo svg{width:28px;height:28px;fill:#fff}
.auth-title{font-size:20px;font-weight:900;text-transform:uppercase;text-align:center}.auth-title span{color:var(--ac2)}
.auth-sub{font-size:12px;color:var(--tx3);text-align:center;margin-top:2px}
.auth-card{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:20px;padding:22px;margin-top:24px;box-shadow:0 4px 20px rgba(0,0,0,.04)}
.fg{margin-bottom:14px}.fg label{display:block;font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 14px;border-radius:var(--r);border:1.5px solid var(--bd);background:var(--sf2);font-size:14px;font-family:var(--f);color:var(--tx);outline:none;transition:.2s}
.fg input:focus,.fg select:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(29,78,216,.08)}
.fg textarea{resize:vertical;min-height:50px;font-family:var(--f)}
.fg .pw-wrap{position:relative}.fg .pw-wrap input{padding-right:44px}
.fg .pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:24px;height:24px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx3)}.fg .pw-eye svg{width:18px;height:18px;stroke:currentColor;fill:none}
.fg .rw{display:flex;gap:8px}.fg .rw>*{flex:1;min-width:0}
.btn-main{width:100%;padding:13px;border-radius:var(--r);border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--f);text-transform:uppercase;letter-spacing:.5px;color:#fff;transition:.15s}.btn-main:active{transform:scale(.97)}
.btn-main.purple{background:linear-gradient(135deg,#1d4ed8,#2563eb);box-shadow:0 4px 16px rgba(29,78,216,.2)}
.btn-main.green{background:linear-gradient(135deg,#059669,#10b981);box-shadow:0 4px 16px rgba(5,150,105,.2)}
.auth-err{font-size:11px;color:var(--rd);font-weight:600;text-align:center;margin-top:10px;min-height:15px}
.auth-link{display:block;text-align:center;margin-top:12px;font-size:11px;color:var(--tx3);font-weight:600;text-decoration:underline;cursor:pointer;background:none;border:none;font-family:var(--f)}
.auth-hint{margin-top:14px;padding:10px;background:var(--sf2);border-radius:var(--r);border:1px solid var(--bd);font-size:10px;color:var(--tx3);display:flex;align-items:center;gap:6px}
.auth-hint svg{width:14px;height:14px;stroke:currentColor;fill:none;flex-shrink:0}
/* OTP Boxes */
.otp-row{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.otp-in{width:44px;height:56px;text-align:center;font-size:24px;font-weight:900;border-radius:var(--r);border:1.5px solid var(--bd);background:var(--sf2);outline:none;font-family:var(--f);transition:.2s}
.otp-in:focus{border-color:var(--gn);box-shadow:0 0 0 3px rgba(5,150,105,.1)}
.otp-sep{display:flex;align-items:center;font-size:18px;color:var(--bd);font-weight:700}
/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:40}
.hdr-logo{display:flex;align-items:center;gap:8px}.hdr-logo .mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);display:flex;align-items:center;justify-content:center}.hdr-logo .mark svg{width:16px;height:16px;fill:#fff}.hdr-logo .nm{font-size:14px;font-weight:900;text-transform:uppercase}.hdr-logo .nm span{color:var(--ac2)}
.hdr-r{display:flex;align-items:center;gap:6px}
.cur-sw{display:flex;border:1px solid var(--bd);border-radius:8px;overflow:hidden}.cur-b{padding:4px 8px;font-size:9px;font-weight:800;border:none;cursor:pointer;font-family:var(--f);transition:.15s;background:var(--sf2);color:var(--tx3)}.cur-b.on{background:var(--ac);color:#fff}
.av{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--ac),#ec4899);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff}
/* Firebase bar */
.fb-bar{display:flex;align-items:center;justify-content:center;gap:4px;padding:5px;font-size:9px;font-weight:700;background:var(--sf);border-bottom:1px solid var(--bd)}.fb-bar .dot{width:5px;height:5px;border-radius:50%}
/* Content */
.cnt{padding:14px 14px 100px}
.pg{display:none;animation:fi .25s}.pg.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* Nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--sf);border-top:1px solid var(--bd);display:flex;justify-content:space-around;padding:6px 4px calc(env(safe-area-inset-bottom,6px)+10px);z-index:40;box-shadow:0 -2px 16px rgba(15,23,42,.06);}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 10px;border:none;background:none;cursor:pointer;border-radius:12px;font-family:var(--f);transition:all .18s;position:relative;min-width:48px;}.nb:active{transform:scale(.88)}.nb svg{width:20px;height:20px;stroke:var(--tx3);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:all .18s;}.nb .nl{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px;transition:all .18s;}
.nb.on{background:rgba(29,78,216,.07);}.nb.on svg{stroke:var(--ac2);}.nb.on .nl{color:var(--ac2);}
.nb .bdg{position:absolute;top:3px;right:5px;min-width:16px;height:16px;border-radius:8px;background:var(--rd);color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--sf);}
/* Cards */
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.scard{background:var(--sf);border:1px solid var(--bd);border-radius:18px;padding:16px;transition:box-shadow .2s;}.scard:hover{box-shadow:0 4px 16px rgba(29,78,216,.08);}
.scard .ic{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}.scard .ic svg{width:20px;height:20px;fill:none;stroke-width:1.7;stroke-linecap:round;}
.scard .lb{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;}.scard .vl{font-size:22px;font-weight:900;margin-top:3px;font-family:var(--m);}
/* Status bars */
.st-bars{background:var(--sf);border:1px solid var(--bd);border-radius:18px;padding:16px;margin-bottom:12px;}.st-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px;}.st-bar:last-child{margin:0}.st-bar .sb-lb{font-size:10px;font-weight:700;width:60px;color:var(--tx2);}.st-bar .sb-wrap{flex:1;height:22px;background:var(--sf2);border-radius:7px;overflow:hidden;}.st-bar .sb-fill{height:100%;border-radius:7px;display:flex;align-items:center;justify-content:flex-end;padding-right:7px;transition:width .6s cubic-bezier(.34,1.56,.64,1);}.st-bar .sb-val{font-size:9px;font-weight:800;color:#fff;}
/* Wrap card */
.cw{background:var(--sf);border:1px solid var(--bd);border-radius:18px;overflow:hidden;margin-bottom:14px;box-shadow:0 1px 4px rgba(15,23,42,.04);}
.cw-h{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--bd);flex-wrap:wrap;gap:6px;background:var(--sf);}
.cw-t{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;display:flex;align-items:center;gap:6px;color:var(--tx);}.cw-t svg{width:14px;height:14px;stroke:var(--ac2);fill:none;stroke-width:1.7;}
/* List items */
.li{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(0,0,0,.04);transition:background .12s;}.li:last-child{border:none;}.li:active{background:var(--sf2);}
.li-i{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden;}.li-i img{width:100%;height:100%;object-fit:cover;}
.li-b{flex:1;min-width:0;}.li-t{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.li-s{font-size:10px;color:var(--tx3);margin-top:2px;}
.li-r{text-align:right;flex-shrink:0;}.li-v{font-size:12px;font-weight:800;font-family:var(--m);color:var(--tx);}.li-d{font-size:9px;color:var(--tx3);}
.emp{text-align:center;padding:32px;color:var(--tx3);font-size:12px;font-weight:600;}
/* Badges */
.bg{padding:3px 8px;border-radius:6px;font-size:9px;font-weight:700;text-transform:uppercase;display:inline-flex;letter-spacing:.2px;}.bg.su{background:rgba(5,150,105,.08);color:var(--gn);border:1px solid rgba(5,150,105,.15);}.bg.pe{background:rgba(217,119,6,.08);color:var(--yw);border:1px solid rgba(217,119,6,.15);}.bg.fa{background:rgba(220,38,38,.07);color:var(--rd);border:1px solid rgba(220,38,38,.12);}
/* Buttons */
.bt{padding:6px 12px;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--f);border:1.5px solid var(--bd);background:var(--sf);color:var(--tx2);display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap;}.bt:active{transform:scale(.94);opacity:.85;}.bt svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;}
.bt.pr{background:var(--ac);color:#fff;border-color:var(--ac);box-shadow:0 2px 8px rgba(29,78,216,.25);}.bt.gn{background:var(--gn);color:#fff;border-color:var(--gn);box-shadow:0 2px 8px rgba(5,150,105,.2);}.bt.yw{background:var(--yw);color:#fff;border-color:var(--yw);}.bt.rd{background:var(--rd);color:#fff;border-color:var(--rd);}.bt.bl{background:var(--blu);color:#fff;border-color:var(--blu);}
.act{display:flex;gap:4px;}.ab{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--bd);background:var(--sf);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;}.ab:active{transform:scale(.88);}.ab svg{width:14px;height:14px;fill:none;stroke-width:1.7;}
/* Section label */
.sec{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 10px;display:flex;align-items:center;gap:6px;color:var(--tx2);}.sec svg{width:13px;height:13px;stroke:var(--ac2);fill:none;}
/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.2s;}.mo.on{opacity:1;pointer-events:all;}
.mc{background:var(--sf);border-radius:24px 24px 0 0;padding:8px 18px 28px;max-width:430px;width:100%;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1,.64,1);max-height:90vh;overflow-y:auto;}.mo.on .mc{transform:translateY(0);}
.m-handle{width:36px;height:4px;border-radius:4px;background:var(--bd);margin:0 auto 16px;}
.mt{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}.mt h3{font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:.3px;}
.mx{width:30px;height:30px;border-radius:9px;border:1.5px solid var(--bd);background:var(--sf);cursor:pointer;display:flex;align-items:center;justify-content:center;}.mx svg{width:13px;height:13px;stroke:var(--tx2);fill:none;stroke-width:2;}
.mf{display:flex;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--bd);}.mb{flex:1;padding:13px;border-radius:12px;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--f);border:none;text-transform:uppercase;letter-spacing:.3px;transition:all .15s;}.mb:active{transform:scale(.96);}.mb.sv{background:linear-gradient(135deg,var(--ac),var(--blu));color:#fff;box-shadow:0 4px 14px rgba(29,78,216,.2);}.mb.cn{background:var(--sf2);color:var(--tx2);border:1.5px solid var(--bd);}.mb.dl{background:var(--rd);color:#fff;}
/* Info rows */
.mr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.04);}.mr:last-child{border:none;}.mr .ml{font-size:11px;color:var(--tx3);font-weight:600;}.mr .mv{font-size:12px;font-weight:700;color:var(--tx);}
/* Image upload */
.img-up{width:100%;height:100px;border:2px dashed var(--bd);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--sf2);overflow:hidden;position:relative;transition:border-color .15s;}.img-up:active{border-color:var(--ac);}.img-up img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}.img-up svg{width:24px;height:24px;stroke:var(--tx3);fill:none;}.img-up span{font-size:10px;color:var(--tx3);font-weight:600;margin-top:4px;}
/* Package list */
.pkl{display:flex;flex-direction:column;gap:6px;margin-top:6px;}.pkr{display:flex;gap:6px;align-items:center;}.pkr input{flex:1;padding:9px 10px;border-radius:9px;border:1.5px solid var(--bd);background:var(--sf2);font-size:12px;font-family:var(--f);color:var(--tx);outline:none;transition:border-color .15s;}.pkr input:focus{border-color:var(--ac);}.pkrm{width:30px;height:30px;border-radius:7px;border:1.5px solid var(--bd);background:none;cursor:pointer;color:var(--rd);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;}
.pka{width:100%;padding:9px;border-radius:9px;border:1.5px dashed var(--bd);background:none;cursor:pointer;font-size:11px;font-weight:700;color:var(--ac2);font-family:var(--f);margin-top:4px;text-align:center;transition:all .15s;}.pka:hover{background:rgba(29,78,216,.04);border-color:var(--ac);}
/* Settings */
.stc{background:var(--sf);border:1px solid var(--bd);border-radius:18px;padding:16px;margin-bottom:12px;}
.stc-t{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:5px;color:var(--ac2);}.stc-t svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;}
.str{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.04);flex-wrap:wrap;gap:4px;}.str:last-child{border:none;}
.stl{font-size:12px;font-weight:700;color:var(--tx);}.sts{font-size:9px;color:var(--tx3);}
.sti{padding:8px 12px;border-radius:9px;border:1.5px solid var(--bd);font-size:12px;font-family:var(--f);color:var(--tx);outline:none;background:var(--sf2);width:100%;transition:border-color .15s;}.sti:focus{border-color:var(--ac);}
.tgl{position:relative;width:40px;height:22px;cursor:pointer;flex-shrink:0;}.tgl input{opacity:0;width:0;height:0;}.tgl .ts{position:absolute;inset:0;background:var(--bd);border-radius:22px;transition:.3s;}.tgl .ts::before{content:'';position:absolute;left:2px;bottom:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.15);}.tgl input:checked+.ts{background:var(--ac);}.tgl input:checked+.ts::before{transform:translateX(18px);}
/* Receipt */
.rcp-img{width:100%;border-radius:10px;border:1px solid var(--bd);overflow:hidden;margin:8px 0;}.rcp-img img{width:100%;display:block;}
.rcp-none{padding:14px;text-align:center;color:var(--tx3);font-size:11px;background:var(--sf2);border-radius:10px;border:1.5px dashed var(--bd);margin:8px 0;}
/* Toast */
.tst{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-12px);padding:12px 20px;border-radius:14px;font-size:12px;font-weight:700;z-index:200;opacity:0;transition:.3s;box-shadow:0 8px 32px rgba(0,0,0,.18);max-width:90%;display:flex;align-items:center;gap:8px;backdrop-filter:blur(8px);}.tst.v{opacity:1;transform:translateX(-50%) translateY(0);}.tst.ok{background:var(--gn);color:#fff;}.tst.er{background:var(--rd);color:#fff;}.tst.in{background:var(--blu);color:#fff;}
/* QR Section */
.qr-wrap{display:flex;justify-content:center;margin:10px 0;}.qr-wrap img{width:160px;height:160px;border-radius:14px;border:1px solid var(--bd);box-shadow:0 4px 16px rgba(0,0,0,.08);}
.secret-row{display:flex;gap:6px;align-items:center;margin:8px 0;}.secret-row code{flex:1;padding:9px 12px;background:var(--sf2);border-radius:9px;font-size:11px;font-family:var(--m);font-weight:700;color:var(--ac2);user-select:all;border:1px solid var(--bd);}
/* PWA */
.pwa-btn{width:100%;padding:13px;border-radius:12px;border:1.5px solid var(--ac);background:rgba(29,78,216,.04);color:var(--ac);font-size:12px;font-weight:800;cursor:pointer;font-family:var(--f);text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:10px;transition:all .15s;}.pwa-btn:active{transform:scale(.96);}.pwa-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;}
/* Shimmer for loading states */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
/* Warning Dialog */
.warn-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s;padding:20px;}
.warn-ov.on{opacity:1;pointer-events:all;}
.warn-box{background:var(--sf);border-radius:22px;padding:26px 22px;width:100%;max-width:300px;text-align:center;transform:scale(.88);transition:transform .25s cubic-bezier(.34,1.2,.64,1);box-shadow:0 24px 60px rgba(0,0,0,.25);}
.warn-ov.on .warn-box{transform:scale(1);}
.warn-ic{width:54px;height:54px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;}
.warn-ic.red{background:rgba(220,38,38,.1);} .warn-ic.blue{background:rgba(29,78,216,.08);}
.warn-ic svg{width:26px;height:26px;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none;}
.warn-ic.red svg{stroke:var(--rd);} .warn-ic.blue svg{stroke:var(--ac);}
.warn-ttl{font-size:16px;font-weight:900;color:var(--tx);margin-bottom:6px;}
.warn-sub{font-size:13px;color:var(--tx2);line-height:1.55;margin-bottom:22px;}
.warn-row{display:flex;gap:10px;}
.warn-no{flex:1;padding:13px;border-radius:13px;border:1.5px solid var(--bd);background:var(--sf2);color:var(--tx2);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--f);}
.warn-yes{flex:1;padding:13px;border-radius:13px;border:none;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--f);color:#fff;}
.warn-yes.red{background:var(--rd);} .warn-yes.blue{background:var(--ac);}
</style></head>
<body>

<!-- WARNING DIALOG -->
<div class="warn-ov" id="warnOv">
  <div class="warn-box">
    <div class="warn-ic" id="wIc"><svg id="wIcSvg" viewBox="0 0 24 24"></svg></div>
    <div class="warn-ttl" id="wTtl"></div>
    <div class="warn-sub" id="wSub"></div>
    <div class="warn-row">
      <button class="warn-no" onclick="wNo()">Cancel</button>
      <button class="warn-yes" id="wYes" onclick="wYes_fn()">Confirm</button>
    </div>
  </div>
</div>

// Delete a single order permanently
function delOrder(i){
  if(!confirm("Delete this order permanently? This cannot be undone."))return;
  var o=O[i];
  if(fb&&o.fbId){db.collection("orders").doc(o.fbId).delete();}
  O.splice(i,1);
  toast("Order deleted","ok");
  rOrd();rDash();
}
// Delete ALL orders (admin bulk clear)
function delAllOrders(){
  var ls=oF==="all"?O:O.filter(function(o){return o.status===oF});
  if(!ls.length){toast("No orders to delete","in");return;}
  var label=oF==="all"?"ALL ("+ls.length+") orders":"all "+oF+" orders ("+ls.length+")";
  if(!confirm("⚠️ Permanently delete "+label+"?\n\nThis cannot be undone."))return;
  var batch=ls.slice();
  batch.forEach(function(o){
    if(fb&&o.fbId){db.collection("orders").doc(o.fbId).delete();}
    var idx=O.indexOf(o);if(idx>=0)O.splice(idx,1);
  });
  toast("Deleted "+batch.length+" orders","ok");
  rOrd();rDash();
}

function uploadCfgImg(field){
  var inp=document.createElement("input");inp.type="file";inp.accept="image/*";inp.style.display="none";
  document.body.appendChild(inp);
  inp.addEventListener("change",function(){
    if(inp.files&&inp.files[0]){
      if(inp.files[0].size>2000000){toast("Max 2MB","er");return;}
      var reader=new FileReader();reader.onload=function(e){
        CFG[field]=e.target.result;svC();toast("Uploaded!","ok");rSet();
      };reader.readAsDataURL(inp.files[0]);
    }
    document.body.removeChild(inp);
  });inp.click();
}
function uploadBanner(){
  var inp=document.createElement("input");inp.type="file";inp.accept="image/*";inp.style.display="none";
  document.body.appendChild(inp);
  inp.addEventListener("change",function(){
    if(inp.files&&inp.files[0]){
      if(inp.files[0].size>2000000){toast("Max 2MB","er");return;}
      var reader=new FileReader();reader.onload=function(e){
        if(!CFG.banners)CFG.banners=[];

  });inp.click();

function loadDefaults(){
  if(!fb){toast("Firebase offline","er");return;}
  if(!confirm("Load default data? This will add Games, Events, Payments, Account data."))return;
  DEF_GAMES.forEach(function(g){db.collection("games").doc(g.n).set(g);});
  DEF_PAYMENTS.forEach(function(p){db.collection("payments").doc(p.n).set(p);});
  DEF_EVENTS.forEach(function(e){db.collection("events").doc(e.title).set(e);});
  DEF_PROMOS.forEach(function(p){db.collection("promos").doc(p.t).set(p);});
  // Reload
  G=DEF_GAMES.slice();P=DEF_PAYMENTS.slice();EVT=DEF_EVENTS.slice();PRM=DEF_PROMOS.slice();
  toast("Defaults loaded! Refresh to see.","ok");
  rDash();
}
// Auto-load defaults if Firebase is empty
function checkAndLoadDefaults(){
  if(!fb||!db)return;
  db.collection("games").get().then(function(s){
    if(s.empty){
      DEF_GAMES.forEach(function(g){db.collection("games").doc(g.n).set(g);});
      DEF_PAYMENTS.forEach(function(p){db.collection("payments").doc(p.n).set(p);});
      DEF_EVENTS.forEach(function(e){db.collection("events").doc(e.title).set(e);});
      DEF_PROMOS.forEach(function(p){db.collection("promos").doc(p.t).set(p);});
      // Mark setup as done so auto-load never runs again
      db.collection("config").doc("store").set({setupDone:true},{merge:true});
      G=DEF_GAMES.slice();P=DEF_PAYMENTS.slice();EVT=DEF_EVENTS.slice();PRM=DEF_PROMOS.slice();
      toast("Default data loaded!","ok");
      setTimeout(function(){rDash();rContent();rPay();},1500);
    }else{
      // Games exist — mark setup done (protection for future reloads)
      db.collection("config").doc("store").set({setupDone:true},{merge:true});
    }
  }).catch(function(){});
}

// DATA PERSISTENCE FIX: Only auto-load defaults ONCE (use a Firestore flag to prevent overwriting edited data)
setTimeout(function(){
  if(!fb||!db)return;
  db.collection("config").doc("store").get().then(function(d){
    // Only load defaults if this is a completely fresh setup (no config doc exists AND no games)
    var hasConfig=d.exists&&d.data()&&d.data().setupDone;
    if(!hasConfig){checkAndLoadDefaults();}
  }).catch(function(){checkAndLoadDefaults();});
},2000);}
